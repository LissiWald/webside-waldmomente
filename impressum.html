<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impressum – Waldmomente</title>
  <meta name="description" content="Impressum von Waldmomente – Elisabeth Müller, Saarbrücken. Angaben gemäß § 5 DDG.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://www.waldmomente.me/impressum.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sand:  #2C2318;
      --cream: #FDFAF5;
      --gold:  #C8A96E;
      --gold-dark: #A07840;
      --text:  #CDBFAD;
      --dark:  #0f1a10;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--sand);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    a { color: var(--gold); text-decoration: none; }
    a:hover { color: var(--gold-dark); }

    /* NAV */
    nav {
      background: rgba(15,26,16,.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(200,169,110,.12);
      padding: 1.2rem clamp(1.5rem,5vw,3rem);
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.35rem;
      color: var(--gold); letter-spacing: .07em;
    }
    .nav-back {
      font-size: .62rem; letter-spacing: .28em; text-transform: uppercase;
      color: rgba(253,250,245,.5); transition: color .3s;
    }
    .nav-back:hover { color: var(--gold); }

    /* CONTENT */
    main {
      flex: 1;
      max-width: 720px; margin: 0 auto;
      padding: 5rem clamp(1.5rem,5vw,3rem) 6rem;
    }
    .eyebrow {
      font-size: .58rem; letter-spacing: .42em; text-transform: uppercase;
      color: var(--gold); display: block; margin-bottom: 1.2rem;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: clamp(2rem,6vw,3.4rem); color: var(--cream);
      line-height: 1.2; margin-bottom: 3rem;
    }
    .gold-line {
      width: 100%; height: 1px; margin-bottom: 3rem;
      background: linear-gradient(90deg, transparent, rgba(200,169,110,.4), transparent);
    }
    h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem; color: var(--gold);
      margin-bottom: .8rem; margin-top: 2.5rem; font-weight: 400;
    }
    p { font-size: .95rem; line-height: 1.9; margin-bottom: .8rem; }

    /* FOOTER */
    footer {
      background: var(--dark); padding: 2.5rem 2rem; text-align: center;
      border-top: 1px solid rgba(200,169,110,.08);
    }
    .footer-nav { display: flex; gap: 2rem; justify-content: center; list-style: none; flex-wrap: wrap; }
    .footer-nav a {
      font-size: .6rem; letter-spacing: .25em; text-transform: uppercase;
      color: rgba(253,250,245,.35); transition: color .3s;
    }
    .footer-nav a:hover { color: var(--gold); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Waldmomente</a>
    <a href="index.html" class="nav-back">← Zurück</a>
  </nav>

  <main>
    <span class="eyebrow">Rechtliches</span>
    <h1>Impressum</h1>
    <div class="gold-line"></div>

    <h2>Angaben gemäß § 5 DDG</h2>
    <p>Elisabeth Müller<br>
    Bismarckstraße 94<br>
    66221 Saarbrücken</p>

    <h2>Kontakt</h2>
    <p>E-Mail: <a href="mailto:info@waldmomente.me">info@waldmomente.me</a><br>
    Website: <a href="https://www.waldmomente.me" target="_blank" rel="noopener">www.waldmomente.me</a></p>
  </main>

  <footer>
    <ul class="footer-nav">
      <li><a href="index.html">Startseite</a></li>
      <li><a href="impressum.html">Impressum</a></li>
      <li><a href="datenschutz.html">Datenschutz</a></li>
    </ul>
  </footer>

</body>
</html>
